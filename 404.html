<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الهيئة العامة للتأمينات والمعاشات – فرع تعز</title>
<!-- GitHub Pages SPA redirect hack -->
<script>
  // Redirect to index.html preserving the path as a query param
  var pathSegmentsToKeep = 1;
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tajawal', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f2338, #1A3A5C);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    padding: 2rem;
  }
  h1 { color: #C8922A; font-size: 5rem; font-weight: 900; }
  p { color: rgba(255,255,255,.65); margin: 1rem 0 2rem; }
  a {
    display: inline-block;
    background: linear-gradient(135deg, #C8922A, #a0731f);
    color: #fff;
    padding: 12px 28px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    transition: filter .2s;
  }
  a:hover { filter: brightness(1.1); }
</style>
<div>
  <h1>404</h1>
  <p>الصفحة التي تبحث عنها غير موجودة</p>
  <a href="./">العودة إلى الرئيسية</a>
</div>
</body>
</html>
